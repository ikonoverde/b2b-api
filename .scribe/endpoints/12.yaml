    uri: api/payment-methods/setup-session
    metadata:
      custom: []
      groupName: 'Payment Methods'
      groupDescription: ''
      subgroup: ''
      subgroupDescription: ''
      title: 'Create Setup Session'
      description: |-
        Creates a Stripe Checkout Session in setup mode so the user can add a new
        payment method via Stripe's hosted page. The client should redirect the
        user to the returned `checkout_url`.
      authenticated: true
      deprecated: false
    headers:
      Authorization: 'Bearer {YOUR_AUTH_TOKEN}'
      Content-Type: application/json
      Accept: application/json
    urlParameters: []
    cleanUrlParameters: []
    queryParameters: []
    cleanQueryParameters: []
    bodyParameters:
      success_url:
        custom: []
        name: success_url
        description: 'The URL to redirect to after successfully adding the card. Must be a valid URL.'
        required: true
        example: 'https://example.com/payment-methods?setup=success'
        type: string
        enumValues: []
        exampleWasSpecified: false
        nullable: false
        deprecated: false
      cancel_url:
        custom: []
        name: cancel_url
        description: 'The URL to redirect to if the user cancels. Must be a valid URL.'
        required: true
        example: 'https://example.com/payment-methods?setup=cancelled'
        type: string
        enumValues: []
        exampleWasSpecified: false
        nullable: false
        deprecated: false
    cleanBodyParameters:
      success_url: 'https://example.com/payment-methods?setup=success'
      cancel_url: 'https://example.com/payment-methods?setup=cancelled'
    fileParameters: []
    responses:
      -
        custom: []
        status: 200
        content: |-
          {
            "checkout_url": "https://checkout.stripe.com/c/setup/cs_test_123"
          }
        headers: []
        description: Success
      -
        custom: []
        status: 422
        content: |-
          {
            "message": "The success url field is required.",
            "errors": {"success_url": ["The success url field is required."]}
          }
        headers: []
        description: 'Validation error'
    responseFields: []
    auth:
      - headers
      - Authorization
      - 'Bearer 6g43cv8PD1aE5beadkZfhV6'
    controller: null
    method: null
    route: null
  -
