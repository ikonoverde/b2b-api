    uri: api/payment-methods/setup-verify
    metadata:
      custom: []
      groupName: 'Payment Methods'
      groupDescription: ''
      subgroup: ''
      subgroupDescription: ''
      title: 'Verify Setup Session'
      description: |-
        Retrieves the Stripe Checkout Session created in setup mode and returns
        the newly added payment method details so the mobile app can confirm.
      authenticated: true
      deprecated: false
    headers:
      Authorization: 'Bearer {YOUR_AUTH_TOKEN}'
      Content-Type: application/json
      Accept: application/json
    urlParameters: []
    cleanUrlParameters: []
    queryParameters:
      session_id:
        custom: []
        name: session_id
        description: 'The Stripe Checkout Session ID to verify.'
        required: true
        example: cs_test_abc123
        type: string
        enumValues: []
        exampleWasSpecified: false
        nullable: false
        deprecated: false
    cleanQueryParameters:
      session_id: cs_test_abc123
    bodyParameters: []
    cleanBodyParameters: []
    fileParameters: []
    responses:
      -
        custom: []
        status: 200
        content: |-
          {
            "status": "complete",
            "payment_method": {
              "id": "pm_1234567890",
              "type": "card",
              "card": {
                "brand": "visa",
                "last4": "4242",
                "exp_month": 12,
                "exp_year": 2025
              }
            }
          }
        headers: []
        description: Success
      -
        custom: []
        status: 200
        content: |-
          {
            "status": "pending",
            "payment_method": null
          }
        headers: []
        description: Pending
      -
        custom: []
        status: 403
        content: |-
          {
            "message": "This session does not belong to your account."
          }
        headers: []
        description: 'Session belongs to another customer'
      -
        custom: []
        status: 422
        content: |-
          {
            "message": "The session id field is required.",
            "errors": {"session_id": ["The session id field is required."]}
          }
        headers: []
        description: 'Validation error'
    responseFields: []
    auth:
      - headers
      - Authorization
      - 'Bearer 6g43cv8PD1aE5beadkZfhV6'
    controller: null
    method: null
    route: null
