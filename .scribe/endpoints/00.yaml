name: Authentication
description: |-

  APIs for user authentication
endpoints:
  -
    custom: []
    httpMethods:
      - POST
    uri: api/register
    metadata:
      custom: []
      groupName: Authentication
      groupDescription: |-

        APIs for user authentication
      subgroup: ''
      subgroupDescription: ''
      title: 'Register a new user'
      description: 'Create a new user account and receive an API token.'
      authenticated: false
      deprecated: false
    headers:
      Content-Type: application/json
      Accept: application/json
    urlParameters: []
    cleanUrlParameters: []
    queryParameters: []
    cleanQueryParameters: []
    bodyParameters:
      name:
        custom: []
        name: name
        description: 'The full name of the user. Must not be greater than 255 characters.'
        required: false
        example: 'John Doe'
        type: string
        enumValues: []
        exampleWasSpecified: false
        nullable: false
        deprecated: false
      rfc:
        custom: []
        name: rfc
        description: 'The RFC (Registro Federal de Contribuyentes) - Mexican tax ID. Must match the regex /^[A-Z&Ñ]{3,4}[0-9]{6}[A-Z0-9]{3}$/. Must be 13 characters.'
        required: false
        example: XAXX010101000
        type: string
        enumValues: []
        exampleWasSpecified: false
        nullable: false
        deprecated: false
      email:
        custom: []
        name: email
        description: 'The email address of the user. Must be a valid email address. Must not be greater than 255 characters.'
        required: true
        example: user@example.com
        type: string
        enumValues: []
        exampleWasSpecified: false
        nullable: false
        deprecated: false
      phone:
        custom: []
        name: phone
        description: 'The phone number of the user. Must not be greater than 20 characters.'
        required: true
        example: '+521234567890'
        type: string
        enumValues: []
        exampleWasSpecified: false
        nullable: false
        deprecated: false
      password:
        custom: []
        name: password
        description: 'The password for the account (minimum 8 characters). Must be at least 8 characters.'
        required: true
        example: password123
        type: string
        enumValues: []
        exampleWasSpecified: false
        nullable: false
        deprecated: false
      terms_accepted:
        custom: []
        name: terms_accepted
        description: 'Whether the user has accepted the terms and conditions. Must be accepted.'
        required: true
        example: true
        type: boolean
        enumValues: []
        exampleWasSpecified: false
        nullable: false
        deprecated: false
      device_name:
        custom: []
        name: device_name
        description: 'Name of the device requesting the token. Must not be greater than 255 characters.'
        required: true
        example: 'My iPhone'
        type: string
        enumValues: []
        exampleWasSpecified: false
        nullable: false
        deprecated: false
    cleanBodyParameters:
      name: 'John Doe'
      rfc: XAXX010101000
      email: user@example.com
      phone: '+521234567890'
      password: password123
      terms_accepted: true
      device_name: 'My iPhone'
    fileParameters: []
    responses:
      -
        custom: []
        status: 201
        content: '{"user": {"id": 1, "name": "John Doe", "email": "john@example.com", "rfc": "ABCD123456XYZ", "phone": "+521234567890"}, "token": "1|abc123def456..."}'
        headers: []
        description: Success
      -
        custom: []
        status: 422
        content: '{"message": "The email has already been taken.", "errors": {"email": ["The email has already been taken."]}}'
        headers: []
        description: 'Validation error'
    responseFields: []
    auth: []
    controller: null
    method: null
    route: null
  -
    custom: []
    httpMethods:
      - POST
    uri: api/login
    metadata:
      custom: []
      groupName: Authentication
      groupDescription: |-

        APIs for user authentication
      subgroup: ''
      subgroupDescription: ''
      title: Login
      description: 'Authenticate a user and receive an API token.'
      authenticated: false
      deprecated: false
    headers:
      Content-Type: application/json
      Accept: application/json
    urlParameters: []
    cleanUrlParameters: []
    queryParameters: []
    cleanQueryParameters: []
    bodyParameters:
      email:
        custom: []
        name: email
        description: 'The email address of the user. Must be a valid email address.'
        required: true
        example: user@example.com
        type: string
        enumValues: []
        exampleWasSpecified: false
        nullable: false
        deprecated: false
      password:
        custom: []
        name: password
        description: 'The password for the account.'
        required: true
        example: password123
        type: string
        enumValues: []
        exampleWasSpecified: false
        nullable: false
        deprecated: false
      device_name:
        custom: []
        name: device_name
        description: 'Name of the device requesting the token. Must not be greater than 255 characters.'
        required: true
        example: 'My iPhone'
        type: string
        enumValues: []
        exampleWasSpecified: false
        nullable: false
        deprecated: false
    cleanBodyParameters:
      email: user@example.com
      password: password123
      device_name: 'My iPhone'
    fileParameters: []
    responses:
      -
        custom: []
        status: 200
        content: '{"user": {"id": 1, "name": "John Doe", "email": "john@example.com", "rfc": "ABCD123456XYZ", "phone": "+521234567890"}, "token": "1|abc123def456..."}'
        headers: []
        description: Success
      -
        custom: []
        status: 422
        content: '{"message": "The provided credentials are incorrect.", "errors": {"email": ["The provided credentials are incorrect."]}}'
        headers: []
        description: 'Invalid credentials'
    responseFields: []
    auth: []
    controller: null
    method: null
    route: null
  -
    custom: []
    httpMethods:
      - POST
    uri: api/forgot-password
    metadata:
      custom: []
      groupName: Authentication
      groupDescription: |-

        APIs for user authentication
      subgroup: ''
      subgroupDescription: ''
      title: 'Forgot password'
      description: |-
        Send a password reset link to the given email address.
        Always returns 200 to prevent email enumeration attacks.
      authenticated: false
      deprecated: false
    headers:
      Content-Type: application/json
      Accept: application/json
    urlParameters: []
    cleanUrlParameters: []
    queryParameters: []
    cleanQueryParameters: []
    bodyParameters:
      email:
        custom: []
        name: email
        description: 'The email address of the user requesting a password reset. Must be a valid email address.'
        required: true
        example: user@example.com
        type: string
        enumValues: []
        exampleWasSpecified: false
        nullable: false
        deprecated: false
    cleanBodyParameters:
      email: user@example.com
    fileParameters: []
    responses:
      -
        custom: []
        status: 200
        content: '{"message": "If an account exists with that email, a reset link has been sent."}'
        headers: []
        description: Success
      -
        custom: []
        status: 422
        content: |-
          {
            "message": "The email field is required.",
            "errors": {"email": ["The email field is required."]}
          }
        headers: []
        description: 'Validation error'
    responseFields: []
    auth: []
    controller: null
    method: null
    route: null
  -
    custom: []
    httpMethods:
      - PUT
    uri: api/password
    metadata:
      custom: []
      groupName: Authentication
      groupDescription: |-

        APIs for user authentication
      subgroup: ''
      subgroupDescription: ''
      title: 'Change password'
      description: "Change the authenticated user's password. Invalidates all other API tokens."
      authenticated: true
      deprecated: false
    headers:
      Authorization: 'Bearer {YOUR_AUTH_TOKEN}'
      Content-Type: application/json
      Accept: application/json
    urlParameters: []
    cleanUrlParameters: []
    queryParameters: []
    cleanQueryParameters: []
    bodyParameters:
      current_password:
        custom: []
        name: current_password
        description: "The user's current password."
        required: true
        example: currentP@ss1
        type: string
        enumValues: []
        exampleWasSpecified: false
        nullable: false
        deprecated: false
      password:
        custom: []
        name: password
        description: 'The new password (min 8 characters).'
        required: true
        example: newP@ssw0rd
        type: string
        enumValues: []
        exampleWasSpecified: false
        nullable: false
        deprecated: false
    cleanBodyParameters:
      current_password: currentP@ss1
      password: newP@ssw0rd
    fileParameters: []
    responses:
      -
        custom: []
        status: 200
        content: '{"message": "Password changed successfully."}'
        headers: []
        description: Success
      -
        custom: []
        status: 422
        content: |-
          {
            "message": "The current password is incorrect.",
            "errors": {"current_password": ["The current password is incorrect."]}
          }
        headers: []
        description: 'Wrong current password'
      -
        custom: []
        status: 422
        content: |-
          {
            "message": "The password field is required.",
            "errors": {"password": ["The password field is required."]}
          }
        headers: []
        description: 'Validation error'
    responseFields: []
    auth:
      - headers
      - Authorization
      - 'Bearer 6g43cv8PD1aE5beadkZfhV6'
    controller: null
    method: null
    route: null
