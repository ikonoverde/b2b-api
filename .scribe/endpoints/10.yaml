    bodyParameters:
      payment_method_id:
        custom: []
        name: payment_method_id
        description: 'The Stripe PaymentMethod ID obtained from Stripe Elements.'
        required: true
        example: pm_1234567890
        type: string
        enumValues: []
        exampleWasSpecified: true
        nullable: false
        deprecated: false
      set_as_default:
        custom: []
        name: set_as_default
        description: 'Whether to set this as the default payment method.'
        required: false
        example: true
        type: boolean
        enumValues: []
        exampleWasSpecified: true
        nullable: false
        deprecated: false
    cleanBodyParameters:
      payment_method_id: pm_1234567890
      set_as_default: true
    fileParameters: []
    responses:
      -
        custom: []
        status: 200
        content: |-
          {
            "message": "Método de pago agregado exitosamente.",
            "payment_method": {
              "id": "pm_1234567890",
              "type": "card",
              "card": {
                "brand": "visa",
                "last4": "4242",
                "exp_month": 12,
                "exp_year": 2025
              },
              "is_default": true
            }
          }
        headers: []
        description: 'Success created'
      -
        custom: []
        status: 422
        content: |-
          {
            "message": "El ID del método de pago es requerido."
          }
        headers: []
        description: 'Validation error'
    responseFields: []
    auth:
      - headers
      - Authorization
      - 'Bearer 6g43cv8PD1aE5beadkZfhV6'
    controller: null
    method: null
    route: null
